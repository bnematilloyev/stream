syntax = "proto3";

package chat.v1;

option go_package = "github.com/sahiy/sahiy-stream/proto/gen/chat/v1;chatv1";

service ChatService {
  rpc GetHistory(GetHistoryRequest) returns (GetHistoryResponse);
  rpc DeleteMessage(DeleteMessageRequest) returns (DeleteMessageResponse);
}

message ChatMessage {
  int64 id = 1;
  string stream_id = 2;
  string user_id = 3;
  string username = 4;
  string display_name = 5;
  string content = 6;
  string type = 7;
  int64 created_at_unix = 8;
}

message GetHistoryRequest {
  string stream_id = 1;
  int64 before_id = 2;
  int32 limit = 3;
}

message GetHistoryResponse {
  repeated ChatMessage messages = 1;
  bool has_more = 2;
}

message DeleteMessageRequest {
  string stream_id = 1;
  int64 message_id = 2;
  string actor_user_id = 3;
  string actor_role = 4;
}

message DeleteMessageResponse {
  bool success = 1;
}
