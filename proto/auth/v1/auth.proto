syntax = "proto3";

package auth.v1;

option go_package = "github.com/sahiy/sahiy-stream/proto/gen/auth/v1;authv1";

service AuthService {
  rpc Register(RegisterRequest) returns (AuthResponse);
  rpc Login(LoginRequest) returns (AuthResponse);
  rpc Refresh(RefreshRequest) returns (AuthResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc GetUser(GetUserRequest) returns (User);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc UpdateUserAdmin(UpdateUserAdminRequest) returns (User);
  rpc GetPlatformStats(GetPlatformStatsRequest) returns (PlatformStatsResponse);
  rpc ListAuditLogs(ListAuditLogsRequest) returns (ListAuditLogsResponse);
}

message RegisterRequest {
  string email = 1;
  string username = 2;
  string display_name = 3;
  string password = 4;
}

message LoginRequest {
  string email = 1;
  string password = 2;
  string device_info = 3;
  string ip_address = 4;
}

message RefreshRequest {
  string refresh_token = 1;
}

message LogoutRequest {
  string refresh_token = 1;
}

message LogoutResponse {
  bool success = 1;
}

message ValidateTokenRequest {
  string access_token = 1;
}

message ValidateTokenResponse {
  bool valid = 1;
  User user = 2;
}

message GetUserRequest {
  string user_id = 1;
}

message AuthResponse {
  User user = 1;
  string access_token = 2;
  string refresh_token = 3;
  int64 expires_at_unix = 4;
}

message User {
  string id = 1;
  string email = 2;
  string username = 3;
  string display_name = 4;
  string role = 5;
  string status = 6;
  bool email_verified = 7;
  int64 created_at_unix = 8;
}

message ListUsersRequest {
  string status = 1;
  string role = 2;
  string search = 3;
  int32 page = 4;
  int32 limit = 5;
}

message ListUsersResponse {
  repeated User users = 1;
  int32 total = 2;
  int32 page = 3;
  int32 limit = 4;
}

message UpdateUserAdminRequest {
  string user_id = 1;
  string actor_id = 2;
  optional string role = 3;
  optional string status = 4;
}

message GetPlatformStatsRequest {}

message PlatformStatsResponse {
  int64 total_users = 1;
  int64 users_active = 2;
  int64 users_suspended = 3;
  int64 users_banned = 4;
  int64 admins = 5;
}

message ListAuditLogsRequest {
  int32 page = 1;
  int32 limit = 2;
}

message AuditLogEntry {
  int64 id = 1;
  string actor_id = 2;
  string action = 3;
  string resource_type = 4;
  string resource_id = 5;
  string details_json = 6;
  int64 created_at_unix = 7;
}

message ListAuditLogsResponse {
  repeated AuditLogEntry logs = 1;
  int32 total = 2;
  int32 page = 3;
  int32 limit = 4;
}
