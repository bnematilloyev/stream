worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record off;

            on_publish "http://172.17.0.1:9084/hooks/publish?internal_secret=__MEDIA_HOOK_SECRET__";
            on_publish_done "http://172.17.0.1:9084/hooks/publish_done?internal_secret=__MEDIA_HOOK_SECRET__";

            allow play 127.0.0.0/8;
            allow play 172.16.0.0/12;
            allow play 10.0.0.0/8;
            deny play all;
        }
    }
}

http {
    server {
        listen 8088;
        location /health {
            return 200 "ok\n";
        }
    }
}
