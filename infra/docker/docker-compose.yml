services:
  postgres:
    image: postgres:16-alpine
    container_name: sahiy-postgres
    environment:
      POSTGRES_USER: sahiy
      POSTGRES_PASSWORD: sahiy_secret
      POSTGRES_DB: sahiy_stream
    ports:
      - "5433:5432"   # 5433 — local PostgreSQL 5432 bilan to'qnashmasligi uchun
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sahiy -d sahiy_stream"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sahiy-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    container_name: sahiy-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: sahiy-minio
    environment:
      MINIO_ROOT_USER: sahiy_minio
      MINIO_ROOT_PASSWORD: sahiy_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx-rtmp:
    image: tiangolo/nginx-rtmp:latest
    container_name: sahiy-nginx-rtmp
    ports:
      - "1935:1935"
      - "8088:8088"
    volumes:
      - ./nginx-rtmp/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8088/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  mediamtx:
    build:
      context: ./mediamtx
      dockerfile: Dockerfile
    image: sahiy-mediamtx:local
    container_name: sahiy-mediamtx
    ports:
      - "8554:8554"   # RTSP (ffmpeg pull)
      - "8889:8889"   # WebRTC / WHIP (browser, telefon)
      - "8189:8189"
      - "8189:8189/udp"
      - "9997:9997"   # API
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9997/v3/paths/list"]
      interval: 10s
      timeout: 5s
      retries: 5

  hls-origin:
    image: nginx:1.27-alpine
    container_name: sahiy-hls-origin
    ports:
      - "8090:8090"
    volumes:
      - ./hls-origin/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../data/hls:/data/hls:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:1.22.1-p0
    container_name: sahiy-pgbouncer
    ports:
      - "6432:6432"
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "127.0.0.1", "-p", "6432"]
      interval: 5s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: sahiy-clickhouse
    ports:
      - "8123:8123"
      - "9009:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
  clickhouse_data:
