# Sahiy Stream — HTTPS (kamera/WHIP uchun majburiy)
# DNS: stream.shopla.uz -> server IP (*.shopla.uz wildcard SSL)

server {
    listen 80;
    server_name stream.shopla.uz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name stream.shopla.uz;

    ssl_certificate /etc/letsencrypt/live/shopla.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shopla.uz/privkey.pem;

    client_max_body_size 20m;

    # WebSocket chat (long-lived)
    location ~ ^/v1/chat/[0-9a-fA-F-]+$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # API gateway (REST)
    location /v1/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:8080/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # HLS playback
    location /hls/ {
        proxy_pass http://127.0.0.1:8090/hls/;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
    }

    # WHIP ingest (UUID/whip)
    location ~ "^/([0-9a-fA-F\-]{36})/whip$" {
        proxy_pass http://127.0.0.1:8889/$1/whip$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http://127.0.0.1:8889/ /;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # WHEP playback (UUID/whep)
    location ~ "^/([0-9a-fA-F\-]{36})/whep$" {
        proxy_pass http://127.0.0.1:8889/$1/whep$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http://127.0.0.1:8889/ /;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Next.js frontend
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
