# Legacy: eski api.stream havolalarini stream.vibrant.uz ga yo'naltirish.
# Yangi deploy: faqat stream.vibrant.uz.conf ishlatiladi (setup-nginx-ssl.sh).

server {
    listen 80;
    listen [::]:80;
    server_name api.stream.vibrant.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://stream.vibrant.uz$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.stream.vibrant.uz;

    ssl_certificate     /etc/letsencrypt/live/stream.vibrant.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stream.vibrant.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://stream.vibrant.uz$request_uri;
}
